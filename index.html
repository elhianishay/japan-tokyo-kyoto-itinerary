<style>
  :root{
    --bg:#fbf7ee; --card:#ffffff; --card2:#f3ead4; --text:#2c2620; --muted:#7a6f5e;

  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{overscroll-behavior-y:none;}
  body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);padding-bottom:calc(80px + env(safe-area-inset-bottom));overscroll-behavior-y:none;}
  header{padding:calc(12px + env(safe-area-inset-top)) 16px 14px;background:var(--card2);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);border-radius:0 0 18px 18px;}
  header h1{margin:0 0 8px;font-size:19px;color:#3a2e1c;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  select,input,button,textarea{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;}
  button{cursor:pointer;}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .btn-secondary{background:var(--accent2);border-color:var(--accent2);color:#fff;}
  main{padding:12px;max-width:760px;margin:0 auto;}
  .day-group{margin-bottom:18px;}
  .day-title{font-size:16px;font-weight:700;color:var(--accent);margin:14px 0 6px;padding-right:4px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(60,46,20,0.06);}
  .card.done{opacity:0.6;}
  .card-photo{width:100%;max-height:180px;object-fit:cover;border-radius:8px;margin-bottom:10px;display:block;background:var(--card2);}
  .card-thumb{width:44px;height:44px;object-fit:cover;border-radius:8px;flex-shrink:0;background:var(--card2);}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .card-time{color:var(--accent2);font-weight:700;font-size:13px;white-space:nowrap;}
  .card-name-row{display:flex;align-items:center;gap:10px;margin:2px 0 4px;}
  .card-name{font-size:16px;font-weight:700;margin:0;}
  .card-notes{color:var(--muted);font-size:13px;margin:4px 0;}
  .wiki-summary{font-size:12px;color:var(--accent2);font-style:italic;margin:4px 0 2px;line-height:1.5;}
  .card-desc{color:var(--text);font-size:13px;margin:8px 0;line-height:1.5;background:var(--card2);border-radius:8px;padding:10px;display:none;}
  .card-desc.open{display:block;}
  .toggle-desc{background:none;border:none;color:var(--accent2);font-size:12px;padding:4px 0;text-decoration:underline;}
  .card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .pill{font-size:12px;padding:3px 8px;border-radius:20px;background:var(--card2);color:var(--muted);}
  .actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .actions a, .actions button{text-decoration:none;font-size:13px;padding:6px 10px;border-radius:8px;}
  .link-map{background:#e6eef7;color:#2c537a;border:1px solid #c7dbef;}
  .link-call{background:#e3f0dc;color:#33502a;border:1px solid #c5e0b8;}
  .link-edit{background:var(--card2);color:var(--text);border:1px solid var(--border);}
  .link-del{background:#fbe6e2;color:#8a2f24;border:1px solid #f0c4ba;}
  .check{position:absolute;left:12px;top:12px;width:20px;height:20px;z-index:2;}
  .fab{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;border:none;border-radius:30px;padding:14px 26px;font-size:15px;font-weight:700;box-shadow:0 4px 14px rgba(178,58,46,0.35);}
  .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:50;align-items:center;justify-content:center;}
  .modal-backdrop.open{display:flex;}
  .modal{background:var(--card);border-radius:12px;padding:20px;width:92%;max-width:440px;max-height:88vh;overflow-y:auto;}
  .modal h2{margin-top:0;font-size:18px;}
  .field{margin-bottom:10px;display:flex;flex-direction:column;gap:4px;}
  .field label{font-size:12px;color:var(--muted);}
  .field input, .field textarea, .field select{width:100%;}
  .modal-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;}
  .empty-msg{color:var(--muted);text-align:center;margin-top:40px;font-size:14px;}
  .stats{font-size:12px;color:var(--muted);margin-top:4px;}
  .sync-badge{font-size:11px;padding:2px 8px;border-radius:10px;margin-right:6px;}
  .sync-ok{background:#e3f0dc;color:#33502a;}
  .sync-bad{background:#fbe6e2;color:#8a2f24;}
  .img-preview{max-width:100%;max-height:120px;border-radius:8px;margin-top:4px;display:none;}
  .guide-modal .modal{max-width:600px;}
  .guide-section{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;}

  .guide-section .actions{margin-top:8px;}
  .btn-link{background:var(--card2);color:var(--accent2);border:1px solid var(--border);font-size:13px;}
  #mapScreen{display:none;position:fixed;inset:0;z-index:40;flex-direction:column;background:var(--bg);}
  #mapScreen.open{display:flex;}
  #mapEl{flex:1;width:100%;}
  .map-header{padding:10px 14px;background:var(--card2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .map-header select{flex:1;}
  .map-status{font-size:12px;color:var(--muted);padding:4px 14px;background:var(--bg);flex-shrink:0;}
</style>

function driveUrlToImg(url){
  if(!url) return url;
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`;
  const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m2) return `https://drive.google.com/thumbnail?id=${m2[1]}&sz=w800`;
  return url;
}

function resizeImageToBase64(file, maxPx=400, quality=0.75){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

document.getElementById('f_photo_file').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const status = document.getElementById('uploadStatus');
  status.textContent = 'מכין תמונה...';
  try {
    const base64 = await resizeImageToBase64(file);
    document.getElementById('f_photo').value = base64;
    status.textContent = '✓ מוכן';
    previewImg();
  } catch(err){
    status.textContent = '⚠ שגיאה: ' + err.message;
  }
});

const DEFAULT_GUIDE = [
{order:1, title:"אפליקציות חובה להתקנה (לפני הטיסה)", content:"Google Maps: האפליקציה הטובה ביותר לניווט רגלי ובתחבורה ציבורית ביפן. מעודכנת בזמן אמת, מראה מאיזה רציף הרכבת יוצאת ובאיזה קרון כדאי לשבת.\n\nJapan Travel by NAVITIME: מאפשרת פילטור מסלולים לפי סוגי כרטיסים (קווי JR בלבד או כרטיסי סאבוויי).\n\nGoogle Translate: חובה להוריד את חבילת השפה היפנית לשימוש אופליין. תכונת המצלמה מצילת חיים לקריאת תפריטים ושילוט.\n\nSmartEX: האפליקציה הרשמית להזמנת כרטיסי שינקנסן בקו טוקיו-קיוטו-אוסקה, מאפשרת לקשר לכרטיס IC הדיגיטלי."},
{order:2, title:"תחבורה ציבורית וכרטיסי IC (Suica / Pasmo / Icoca)", content:"כרטיסי IC הם ארנק אלקטרוני נטען לתשלום ברכבות, סאבוויי, אוטובוסים, מכונות שתייה וחנויות נוחות.\n\nלאייפון: אל תקנו כרטיס פיזי! פתחו Apple Wallet, הוסיפו Transit Card מסוג Suica או Pasmo, וטענו עם כרטיס אשראי (Mastercard/אמריקן אקספרס עובדים הכי טוב, Visa עלולה להיתקל בבעיות).\n\nלאנדרואיד: יש לרכוש כרטיס פיזי בשדה התעופה (Welcome Suica או Pasmo Passport - בלי פיקדון, תקפים 28 יום, או ICOCA באוסקה)."},
{order:3, title:"האם משתלם JR Pass?", content:"לא! באוקטובר 2023 מחירי ה-JR Pass הארצי עלו ב-65-70%. במסלול חד-כיווני מאוסקה/קיוטו לטוקיו, פס ל-7 ימים יקר כמעט פי 2 מרכישת כרטיסים בודדים.\n\nהחלופה הנכונה: כרטיס נפרד ל-Haruka Express משדה התעופה לקיוטו, כרטיס IC לרכבות מקומיות, וכרטיס כיווני אחד לשינקנסן קיוטו-טוקיו."},
{order:4, title:"רכישת כרטיסים לשינקנסן", content:"בנובמבר (שיא השלכת) רכבות השינקנסן בין קיוטו לטוקיו עלולות להיות מלאות.\n\nאיך לרכוש: דרך אתר/אפליקציית SmartEX בדיוק 30 יום לפני הנסיעה. הזמינו מקומות שמורים ברכבת Nozomi (כשעתיים ורבע).\n\nטיפ למזוודות: אם המזוודה מעל 160 ס\"מ כולל גלגלים, חובה לבחור מושב עם מקום למזוודות גדולות (השורה האחרונה בקרון, בלי תוספת תשלום אך מקומות מוגבלים).\n\nטיפ לנוף: מקיוטו לטוקיו בחרו מושבים בשורה E (צד שמאל) לראות את הר פוג'י כ-45 דקות לפני ההגעה."},
{order:5, title:"התנהלות בתחנות רכבת", content:"תחנות כמו קיוטו, שינג'וקו ושיבויה הן ערים תת-קרקעיות. עקבו אחרי שם היציאה (Central Exit, Hachiko Exit וכו') כפי ש-Google Maps מנחה, לא לפי שם הרחוב.\n\nעמדו בתור מסודר על הסימונים שעל הרצפה ברציף - הרכבות עוצרות בדיוק על הסנטימטר.\n\nשמרו על שקט ברכבות: העבירו טלפונים למצב רטט ואל תנהלו שיחות קוליות."},
{order:6, title:"תשלום, אינטרנט ו-SIM", content:"מזומן מול אשראי: רוב החנויות והמסעדות מקבלות אשראי בינלאומי, אבל שווקי אוכל, מקדשים קטנים ומכונות כרטיסים דורשים מזומן. מומלץ למשוך כ-20,000 ין במזומן לזוג, בכספומטים של 7-Eleven (7-Bank).\n\neSIM: רכשו eSIM (Airalo, Nomad, Ubigi) לפני הטיסה - לפחות 10-20GB. כך נשאר מספר הוואטסאפ הישראלי פעיל עם רשת SoftBank/Docomo."},
{order:7, title:"טיפים למטיילים עצמאיים בכושר טוב", content:"שירות משלוח מזוודות (Takkyubin/Takuhaibin): הסוד השמור של המטיילים המנוסים. חברת Yamato Transport (לוגו חתולה שחורה) מעבירה מזוודות בין מלונות תמורת כ-2,000-3,000 ין למזוודה, מגיעות למחרת. אפשר לנסוע בשינקנסן רק עם תיק גב.\n\nנעליים: ילכו 15,000-25,000 צעדים ביום כולל שיפועים ומדרגות אבן. הביאו נעלי הליכה איכותיות עם סוליה מונעת החלקה - מדרגות מקדשים ושורשי עצים חלקלקים בנובמבר."},
{order:8, title:"סניפי יוניקלו (Uniqlo) חובה", content:"Uniqlo Ginza (טוקיו): חנות הדגל הגדולה בעולם, 12 קומות. קומה שלמה של עיצובים בהתאמה אישית (UTme!), בית קפה, כל קולקציה אפשרית. כתובת: 6 Chome-9-5 Ginza, Chuo City, Tokyo.\n\nUniqlo Shinsaibashi (אוסקה): סניף דגל ענק עם חזית אדריכלית מוארת, נוח לקניות מרוכזות במהלך יום הסיור באוסקה. כתובת: 1 Chome-9-1 Shinsaibashisuji, Chuo Ward, Osaka.\n\nטיפ מס (Tax-Free): הגיעו עם הדרכון הפיזי (לא צילום). בקנייה מעל 5,000 ין ברשתות הגדולות מתקבל פטור מיידי ממס בגובה 10% בקופה."},
{order:9, title:"חנויות סכינים איכותיות (סכיני שף בעבודת יד)", content:"סכין שף יפנית (Gyuto, Santoku או Nakiri) עשויה פלדת פחמן גבוהה (שרוגאמי/אאוגאמי) ושומרת על חדות יוצאת דופן.\n\nבאוסקה (רחוב Doguyasuji): Sakai Ichimonji Mitsuhide - אחת החנויות המוערכות ביפן, ממקור סאקאי (עיר נפחי הסכינים ההיסטורית), עם הטבעת שם ביפנית על הלהב במקום. כתובת: 14-8 Nambasennichimae, Chuo Ward, Osaka.\n\nבטוקיו (רחוב Kappabashi): Kama-Asa - עיצוב מודרני, צוות דובר אנגלית מצוינת שמסביר על סוגי הפלדות ומאפשר ניסוי חיתוך במקום. כתובת: 2 Chome-24-1 Matsugaya, Taito City, Tokyo.\nTsubaya - חנות מסורתית עמוסה בלב קאפבאשי עם ריכוז סכינים מכל אזורי הנפחות ביפן (Sakai, Takefu, Seki). כתובת: 3 Chome-7-2 Nishiasakusa, Taito City, Tokyo."},
{order:10, title:"רכישות ייחודיות נוספות ליפן", content:"לבוש טיולים ושטח: רשת Montbell - ה\"נורת' פייס\" של יפן. ציוד טיולים, מעילים קלים, חולצות מנדפות וציוד קמפינג באיכות גבוהה ובמחירים טובים בהרבה מהמותגים המערביים בישראל. סניפים גדולים בשיבויה (טוקיו) ובמרכז קיוטו.\n\nמוצרי נייר וכלי כתיבה: רשת Itoya בגינזה (בניין 12 קומות) - מקדש לחובבי עיצוב, נייר, עטים נובעים ומחברות יפניות.\n\nתה מאצ'ה וקרמיקה: קנו בקיוטו, באזור סביב מקדש קיומיזו-דרה או בחנויות היסטוריות כמו Ippodo Tea."}

let guideData = [];

async function ensureGuideSeeded(){
  const snap = await getDocs(guideRef);
  if(snap.empty){
    const batch = writeBatch(db);
    DEFAULT_GUIDE.forEach(item=>{
      const ref = doc(guideRef);
      batch.set(ref, item);
    });
    await batch.commit();
  }
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function linkify(text){
  const escaped = escapeHtml(text||'');
  return escaped.replace(/(https?:\/\/[^\s<]+)/g, url=>{
    const clean = url.replace(/[).,]+$/,'');
    const trail = url.slice(clean.length);
    return `<a href="${clean}" target="_blank" rel="noopener" style="color:var(--accent2);text-decoration:underline;">${clean}</a>${trail}`;
  });
}
function renderGuide(){
  const list = document.getElementById('guideList');
  list.innerHTML = '';
  const sorted = [...guideData].sort((a,b)=>(a.order||999)-(b.order||999));
  sorted.forEach(sec=>{
    const div = document.createElement('div');
    div.className = 'guide-section';
    if(sec.photoUrl){
      const img = document.createElement('img');
      img.className='card-photo'; img.src=sec.photoUrl; img.loading='lazy';
      img.onerror = ()=>{ img.style.display='none'; };
      div.appendChild(img);
    }
    const h3 = document.createElement('h3'); h3.textContent = sec.title;
    const p = document.createElement('p'); p.innerHTML = linkify(sec.content);
    div.appendChild(h3); div.appendChild(p);
    const actions = document.createElement('div'); actions.className='actions';
    const editBtn = document.createElement('button');
    editBtn.className='link-edit'; editBtn.textContent='✏ עריכה';
    editBtn.onclick = ()=>openSectionModal(sec);
    actions.appendChild(editBtn);
    const delBtn = document.createElement('button');
    delBtn.className='link-del'; delBtn.textContent='🗑 מחיקה';
    delBtn.onclick = ()=>{
      if(confirm('למחוק את הסעיף "'+sec.title+'"?')) deleteDoc(doc(db,'guide',sec.id));
    };
    actions.appendChild(delBtn);
    div.appendChild(actions);
    list.appendChild(div);
  });
}

function openSectionModal(sec){
  document.getElementById('sectionModalTitle').textContent = sec ? 'עריכת סעיף' : 'סעיף חדש';
  document.getElementById('s_id').value = sec ? sec.id : '';
  document.getElementById('s_title').value = sec ? sec.title : '';
  document.getElementById('s_photo').value = sec ? (sec.photoUrl||'') : '';
  document.getElementById('s_content').value = sec ? sec.content : '';
  previewSectionImg();
  document.getElementById('sectionBackdrop').classList.add('open');
}

let data = [];

async function ensureSeeded(){
  const metaRef = doc(db, '_meta', 'seeded');
  const metaSnap = await getDoc(metaRef);
  if(metaSnap.exists()) return;
  await setDoc(metaRef, {at: Date.now()});
  const batch = writeBatch(db);
  DEFAULT_DATA.forEach(item=>{
    const ref = doc(pointsRef);
    batch.set(ref, {...item, done:false, mapLink:"", photoUrl:"", desc:""});
  });
  await batch.commit();
}

function mapsUrl(item){
  if(item.mapLink && item.mapLink.trim()) return item.mapLink.trim();
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(item.address||'');
}
function telUrl(phone){
  return 'tel:' + phone.replace(/[^0-9+]/g,'');
}

function dayNum(day){
  const m = String(day||'').match(/\d+/);
  return m ? parseInt(m[0],10) : 9999;
}
function timeNum(time){
  const m = String(time||'').match(/(\d{1,2}):(\d{2})/);
  return m ? (parseInt(m[1],10)*60 + parseInt(m[2],10)) : 9999;
}
function uniqueDays(){
  const seen = [];
  data.forEach(d=>{ if(!seen.includes(d.day)) seen.push(d.day); });
  seen.sort((a,b)=> dayNum(a)-dayNum(b) || String(a).localeCompare(String(b)));
  return seen;
}

function renderDayFilter(){
  const sel = document.getElementById('dayFilter');
  const current = sel.value;
  sel.innerHTML = '<option value="all">כל הימים</option>';
  uniqueDays().forEach(day=>{
    const opt = document.createElement('option');
    opt.value = day; opt.textContent = day;
    sel.appendChild(opt);
  });
  if([...sel.options].some(o=>o.value===current)) sel.value = current;
}

function render(){
  renderDayFilter();
  const main = document.getElementById('main');
  main.innerHTML = '';
  const filterDay = document.getElementById('dayFilter').value;
  const q = document.getElementById('searchBox').value.trim().toLowerCase();

  let filtered = data.filter(d=>{
    if(filterDay!=='all' && d.day!==filterDay) return false;
    if(q && !(d.place||'').toLowerCase().includes(q) && !(d.notes||'').toLowerCase().includes(q) && !(d.desc||'').toLowerCase().includes(q)) return false;
    return true;
  });

  if(filtered.length===0){
    main.innerHTML = '<div class="empty-msg">לא נמצאו נקודות עניין</div>';
    updateStats();
    return;
  }

  const grouped = {};
  const order = [];
  filtered.forEach(d=>{
    if(!grouped[d.day]){ grouped[d.day]=[]; order.push(d.day); }
    grouped[d.day].push(d);
  });

  order.sort((a,b)=> dayNum(a)-dayNum(b) || String(a).localeCompare(String(b)));
  Object.keys(grouped).forEach(day=>{
    grouped[day].sort((a,b)=> timeNum(a.time)-timeNum(b.time));
  });

  order.forEach(day=>{
    const groupDiv = document.createElement('div');
    groupDiv.className='day-group';
    const title = document.createElement('div');
    title.className='day-title';
    title.textContent = day + (grouped[day][0].date ? '  •  ' + grouped[day][0].date : '');
    groupDiv.appendChild(title);

    grouped[day].forEach(item=>{
      groupDiv.appendChild(renderCard(item));
    });
    main.appendChild(groupDiv);
  });

  updateStats();
}

function renderCard(item){
  const card = document.createElement('div');
  card.className = 'card' + (item.done?' done':'');

  const check = document.createElement('input');
  check.type='checkbox'; check.className='check'; check.checked=!!item.done;
  check.onchange = ()=>{ updateDoc(doc(db,'points',item.id), {done: check.checked}); };
  card.appendChild(check);

  const top = document.createElement('div');
  top.className='card-top';
  const timeEl = document.createElement('div');
  timeEl.className='card-time'; timeEl.textContent = item.time||'';
  top.appendChild(timeEl);
  card.appendChild(top);

  const nameRow = document.createElement('div');
  nameRow.className='card-name-row';
  if(item.photoUrl){
    const thumb = document.createElement('img');
    thumb.className='card-thumb'; thumb.src=item.photoUrl; thumb.loading='lazy';
    thumb.onerror = ()=>{ thumb.style.display='none'; };
    nameRow.appendChild(thumb);
  }
  const name = document.createElement('div');
  name.className='card-name'; name.textContent = item.place;
  nameRow.appendChild(name);
  card.appendChild(nameRow);

  if(item.notes){
    const notes = document.createElement('div');
    notes.className='card-notes'; notes.textContent = item.notes;
    card.appendChild(notes);
  }
  const wikiText = WIKI_SUMMARIES[item.address||''];
  if(wikiText){
    const wikiDiv = document.createElement('div');
    wikiDiv.className='wiki-summary';
    wikiDiv.textContent = wikiText;
    card.appendChild(wikiDiv);
  }

  if(item.desc){
    const toggle = document.createElement('button');
    toggle.className='toggle-desc'; toggle.textContent='👁 קרא עוד';
    const desc = document.createElement('div');
    desc.className='card-desc'; desc.textContent = item.desc;
    toggle.onclick = ()=>{
      desc.classList.toggle('open');
      toggle.textContent = desc.classList.contains('open') ? '🔼 הסתר' : '👁 קרא עוד';
    };
    card.appendChild(toggle);
    card.appendChild(desc);
  }

  const meta = document.createElement('div');
  meta.className='card-meta';
  if(item.cost && item.cost!=='-'){
    const pill = document.createElement('span'); pill.className='pill'; pill.textContent='💴 '+item.cost;
    meta.appendChild(pill);
  }
  if(item.phone){
    const pill = document.createElement('span'); pill.className='pill'; pill.textContent='☎ '+item.phone;
    meta.appendChild(pill);
  }
  card.appendChild(meta);

  const actions = document.createElement('div');
  actions.className='actions';

  const mapA = document.createElement('a');
  mapA.href = mapsUrl(item); mapA.target='_blank'; mapA.className='link-map';
  mapA.textContent = '🧭 ניווט בגוגל מאפ';
  actions.appendChild(mapA);

  if(item.phone){
    const a = document.createElement('a');
    a.href = telUrl(item.phone); a.className='link-call';
    a.textContent = '☎ חיוג';
    actions.appendChild(a);
  }
  if(item.websiteUrl){
    const a = document.createElement('a');
    a.href = item.websiteUrl; a.target='_blank'; a.className='btn-link';
    a.textContent = '🌐 אתר עם הסברים';
    actions.appendChild(a);
  }
  const editBtn = document.createElement('button');
  editBtn.className='link-edit'; editBtn.textContent='✏ עריכה';
  editBtn.onclick = ()=>openModal(item);
  actions.appendChild(editBtn);

  const delBtn = document.createElement('button');
  delBtn.className='link-del'; delBtn.textContent='🗑 מחיקה';
  delBtn.onclick = ()=>{
    if(confirm('למחוק את "'+item.place+'"?')){
      deleteDoc(doc(db,'points',item.id));
    }
  };
  actions.appendChild(delBtn);

  card.appendChild(actions);
  return card;
}

function updateStats(){

document.getElementById('importFile').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  if(!confirm('שחזור יוסיף את כל הנקודות מהגיבוי מעל הנתונים הקיימים. להמשיך?')) return;
  const text = await file.text();
  let backup;
  try { backup = JSON.parse(text); } catch{ alert('קובץ לא תקין'); return; }
  if(!backup.points){ alert('קובץ גיבוי לא מזוהה'); return; }
  const batch = writeBatch(db);
  backup.points.forEach(item=>{
    const {id, ...data} = item;
    batch.set(doc(pointsRef), data);
  });
  if(backup.guide){
    backup.guide.forEach(item=>{
      const {id, ...data} = item;
      batch.set(doc(guideRef), data);
    });
  }
  await batch.commit();
  e.target.value = '';
  alert(`✓ שוחזרו ${backup.points.length} נקודות עניין בהצלחה`);
});

document.getElementById('dedupBtn').onclick = async ()=>{
  const snap = await getDocs(pointsRef);
  const all = snap.docs.map(d=>({id:d.id, ...d.data()}));
  const seen = {};
  const toDelete = [];
  all.forEach(item=>{
    const key = (item.place||'').trim() + '|' + (item.day||'').trim() + '|' + (item.time||'').trim();
    if(seen[key]){
      const existing = seen[key];
      const existingScore = Object.values(existing).filter(v=>v && v!=='-').length;
      const newScore = Object.values(item).filter(v=>v && v!=='-').length;
      if(newScore > existingScore){
        toDelete.push(existing.id);
        seen[key] = item;
      } else {
        toDelete.push(item.id);
      }
    } else {
      seen[key] = item;
    }
  });
  if(toDelete.length === 0){
    alert('לא נמצאו כפילויות!');
    return;
  }
  if(confirm(`נמצאו ${toDelete.length} כפילויות. למחוק אותן?`)){
    const batch = writeBatch(db);
    toDelete.forEach(id => batch.delete(doc(db,'points',id)));
    await batch.commit();
    alert(`✓ נמחקו ${toDelete.length} כפילויות בהצלחה`);
  }
};

document.getElementById('resetBtn').onclick = async ()=>{
  if(confirm('זה ימחק את כל הנקודות הקיימות (כולל של כולם) ויחזיר לנתוני הבסיס. להמשיך?')){

    const batch = writeBatch(db);
    snap.forEach(d=>batch.delete(d.ref));
    await batch.commit();
    await ensureSeeded();
  }
};

const DAY_COLORS = ['#b23a2e','#2c7ab2','#2e8b57','#8b5e2e','#6b2e8b','#2e7a8b','#8b2e6b','#5e8b2e','#2e4e8b','#8b7a2e','#2e8b7a','#8b2e2e','#4e2e8b'];
let leafletMap = null, mapMarkers = [];

function geocacheKey(addr){ return 'geo:'+addr; }

async function geocode(address){
  const key = geocacheKey(address);
  const cached = localStorage.getItem(key);
  if(cached) return JSON.parse(cached);
  try{
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`,
      {headers:{'Accept-Language':'en','User-Agent':'japan-trip-app'}});
    const j = await r.json();
    if(j.length){
      const result = {lat:parseFloat(j[0].lat), lng:parseFloat(j[0].lon)};
      localStorage.setItem(key, JSON.stringify(result));
      return result;
    }
  }catch(e){}
  return null;
}

async function openMap(){
  document.getElementById('mapScreen').classList.add('open');
  const sel = document.getElementById('mapDayFilter');
  sel.innerHTML = '<option value="all">כל הימים</option>';
  uniqueDays().forEach(day=>{
    const o = document.createElement('option'); o.value=day; o.textContent=day; sel.appendChild(o);
  });

  if(!leafletMap){
    leafletMap = L.map('mapEl').setView([35.5, 136.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {attribution:'© OpenStreetMap contributors', maxZoom:19}).addTo(leafletMap);
  }
  await renderMapMarkers(sel.value);
  sel.onchange = ()=> renderMapMarkers(sel.value);
}

async function renderMapMarkers(filterDay){
  mapMarkers.forEach(m=>m.remove());
  mapMarkers = [];
  const days = uniqueDays();
  const filtered = filterDay==='all' ? data : data.filter(d=>d.day===filterDay);
  const status = document.getElementById('mapStatus');
  const bounds = [];
  let done=0;

  for(const item of filtered){
    if(!item.address) continue;
    status.textContent = `ממפה נקודות... ${done+1}/${filtered.length}`;
    const coords = await geocode(item.address);
    done++;
    if(!coords) continue;
    const dayIdx = days.indexOf(item.day) % DAY_COLORS.length;
    const color = DAY_COLORS[dayIdx];
    const icon = L.divIcon({
      className:'',
      html:`<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>`,
      iconSize:[14,14], iconAnchor:[7,7]
    });
    const marker = L.marker([coords.lat, coords.lng], {icon})
      .bindPopup(`<b style="font-size:14px">${item.place}</b><br><span style="color:#666;font-size:12px">${item.day}${item.time?' · '+item.time:''}</span>${item.notes?'<br><span style="font-size:12px">'+item.notes+'</span>':''}`)
      .addTo(leafletMap);
    mapMarkers.push(marker);
    bounds.push([coords.lat, coords.lng]);
    if(bounds.length===1) leafletMap.setView([coords.lat,coords.lng],13);
    await new Promise(r=>setTimeout(r,1100));
  }
  if(bounds.length>1) leafletMap.fitBounds(bounds, {padding:[30,30]});
  status.textContent = `${bounds.length} נקודות על המפה`;
  setTimeout(()=>leafletMap.invalidateSize(),100);
}

document.getElementById('mapBtn').onclick = openMap;
document.getElementById('mapCloseBtn').onclick = ()=>{
  document.getElementById('mapScreen').classList.remove('open');
};

function hideSplash(){
  const splash = document.getElementById('splash');
  if(splash){ splash.style.opacity='0'; setTimeout(()=>splash.remove(), 650); }
}

onSnapshot(pointsRef, (snap)=>{
  data = snap.docs.map(d=>({id:d.id, ...d.data()}));
  render();
  hideSplash();
}, (err)=>{
  hideSplash();
  document.getElementById('stats').innerHTML = '<span class="sync-badge sync-bad">⚠ שגיאת חיבור</span> ' + err.message;
});

onSnapshot(guideRef, (snap)=>{
  guideData = snap.docs.map(d=>({id:d.id, ...d.data()}));
  renderGuide();
});

document.getElementById('guideBtn').onclick = ()=>document.getElementById('guideBackdrop').classList.add('open');
document.getElementById('guideCloseBtn').onclick = ()=>document.getElementById('guideBackdrop').classList.remove('open');
document.getElementById('guideBackdrop').onclick = (e)=>{ if(e.target.id==='guideBackdrop') document.getElementById('guideBackdrop').classList.remove('open'); };
document.getElementById('guideAddBtn').onclick = ()=>openSectionModal(null);
document.getElementById('sectionCancelBtn').onclick = ()=>document.getElementById('sectionBackdrop').classList.remove('open');
document.getElementById('sectionBackdrop').onclick = (e)=>{ if(e.target.id==='sectionBackdrop' && confirm('לסגור? השינויים לא יישמרו.')) document.getElementById('sectionBackdrop').classList.remove('open'); };

document.getElementById('sectionSaveBtn').onclick = async ()=>{
  const id = document.getElementById('s_id').value;
  const title = document.getElementById('s_title').value.trim();
  const photoUrl = document.getElementById('s_photo').value.trim();
  const content = document.getElementById('s_content').value.trim();
  if(!title){ alert('יש להזין כותרת'); return; }
  if(id){
    await updateDoc(doc(db,'guide',id), {title, photoUrl, content});
  } else {
    const maxOrder = guideData.reduce((m,s)=>Math.max(m, s.order||0), 0);
    await addDoc(guideRef, {title, photoUrl, content, order: maxOrder+1});
  }
  document.getElementById('sectionBackdrop').classList.remove('open');
};

ensureSeeded();
ensureGuideSeeded();
</script>
