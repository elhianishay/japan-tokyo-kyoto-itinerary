<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>המסלול שלי ביפן</title>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --card2:#22262f; --text:#eef0f3; --muted:#9aa3b2;
    --accent:#e0533d; --accent2:#3d8de0; --done:#2e7d4f; --border:#2c313c;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px;}
  header{padding:16px;background:var(--card);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);}
  header h1{margin:0 0 8px;font-size:20px;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  select,input,button,textarea{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;}
  button{cursor:pointer;}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .btn-secondary{background:var(--accent2);border-color:var(--accent2);color:#fff;}
  main{padding:12px;max-width:760px;margin:0 auto;}
  .day-group{margin-bottom:18px;}
  .day-title{font-size:16px;font-weight:700;color:var(--accent);margin:14px 0 6px;padding-right:4px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;position:relative;}
  .card.done{opacity:0.55;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .card-time{color:var(--accent2);font-weight:700;font-size:13px;white-space:nowrap;}
  .card-name{font-size:16px;font-weight:700;margin:2px 0 4px;}
  .card-notes{color:var(--muted);font-size:13px;margin:4px 0;}
  .card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .pill{font-size:12px;padding:3px 8px;border-radius:20px;background:var(--card2);color:var(--muted);}
  .actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .actions a, .actions button{text-decoration:none;font-size:13px;padding:6px 10px;border-radius:8px;}
  .link-map{background:#1e3a5f;color:#9cc4ff;border:1px solid #2c4f7c;}
  .link-call{background:#1e4a2c;color:#9cf0b0;border:1px solid #2c6f3c;}
  .link-edit{background:var(--card2);color:var(--text);border:1px solid var(--border);}
  .link-del{background:#3a1e1e;color:#ff9c9c;border:1px solid #6f2c2c;}
  .check{position:absolute;left:12px;top:12px;width:20px;height:20px;}
  .fab{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;border:none;border-radius:30px;padding:14px 26px;font-size:15px;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,0.4);}
  .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:50;align-items:center;justify-content:center;}
  .modal-backdrop.open{display:flex;}
  .modal{background:var(--card);border-radius:12px;padding:20px;width:92%;max-width:440px;max-height:88vh;overflow-y:auto;}
  .modal h2{margin-top:0;font-size:18px;}
  .field{margin-bottom:10px;display:flex;flex-direction:column;gap:4px;}
  .field label{font-size:12px;color:var(--muted);}
  .field input, .field textarea, .field select{width:100%;}
  .modal-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;}
  .empty-msg{color:var(--muted);text-align:center;margin-top:40px;font-size:14px;}
  .stats{font-size:12px;color:var(--muted);margin-top:4px;}
</style>
</head>

<header>
  <h1>🗾 המסלול שלי ביפן — 13.11 עד 25.11.2026</h1>
  <div class="toolbar">
    <select id="dayFilter"><option value="all">כל הימים</option></select>
    <input id="searchBox" placeholder="חיפוש מקום..." style="flex:1;min-width:120px;">
    <button id="exportBtn" class="link-edit">ייצוא JSON</button>
    <button id="resetBtn" class="link-del">איפוס לנתוני בסיס</button>
  </div>
  <div class="stats" id="stats"></div>
</header>

<main id="main"></main>

<button class="fab" id="addBtn">+ הוסף נקודת עניין</button>

<div class="modal-backdrop" id="modalBackdrop">

    <input type="hidden" id="editId">

    <div class="field"><label>תאריך</label><input id="f_date" placeholder="26/11/2026"></div>
    <div class="field"><label>שעה</label><input id="f_time" placeholder="10:00-12:00"></div>
    <div class="field"><label>שם המקום</label><input id="f_place" placeholder="שם המקום"></div>
    <div class="field"><label>כתובת (לניווט בגוגל מאפ)</label><input id="f_address" placeholder="כתובת באנגלית, למשל: Shibuya Tokyo Japan"></div>
    <div class="field"><label>טלפון</label><input id="f_phone" placeholder="+81-..."></div>
    <div class="field"><label>הערות</label><textarea id="f_notes" rows="3"></textarea></div>
    <div class="field"><label>עלות</label><input id="f_cost" placeholder="500 יין"></div>
    <div class="modal-actions">
      <button id="cancelBtn" class="link-edit">ביטול</button>
      <button id="saveBtn" class="btn-primary">שמירה</button>
    </div>
  </div>
</div>

let data = [];
let nextId = 1;

function loadData(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{ data = JSON.parse(raw); }catch(e){ data = clone(DEFAULT_DATA); }
  } else {
    data = clone(DEFAULT_DATA);
  }
  data.forEach(d=>{ if(!d.id) d.id = nextId++; if(d.id>=nextId) nextId=d.id+1; if(d.done===undefined) d.done=false; });
  saveData();
}
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function mapsUrl(address){
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address);
}
function telUrl(phone){
  return 'tel:' + phone.replace(/[^0-9+]/g,'');
}

function uniqueDays(){
  const seen = [];
  data.forEach(d=>{ if(!seen.includes(d.day)) seen.push(d.day); });
  return seen;
}

function renderDayFilter(){
  const sel = document.getElementById('dayFilter');
  const current = sel.value;
  sel.innerHTML = '<option value="all">כל הימים</option>';
  uniqueDays().forEach(day=>{
    const opt = document.createElement('option');
    opt.value = day; opt.textContent = day;
    sel.appendChild(opt);
  });
  if([...sel.options].some(o=>o.value===current)) sel.value = current;
}

function render(){
  renderDayFilter();
  const main = document.getElementById('main');
  main.innerHTML = '';
  const filterDay = document.getElementById('dayFilter').value;
  const q = document.getElementById('searchBox').value.trim().toLowerCase();

  let filtered = data.filter(d=>{
    if(filterDay!=='all' && d.day!==filterDay) return false;
    if(q && !(d.place||'').toLowerCase().includes(q) && !(d.notes||'').toLowerCase().includes(q)) return false;
    return true;
  });

  if(filtered.length===0){
    main.innerHTML = '<div class="empty-msg">לא נמצאו נקודות עניין</div>';
    updateStats();
    return;
  }

  const grouped = {};
  const order = [];
  filtered.forEach(d=>{
    if(!grouped[d.day]){ grouped[d.day]=[]; order.push(d.day); }
    grouped[d.day].push(d);
  });

  order.forEach(day=>{
    const groupDiv = document.createElement('div');
    groupDiv.className='day-group';
    const title = document.createElement('div');
    title.className='day-title';
    title.textContent = day + (grouped[day][0].date ? '  •  ' + grouped[day][0].date : '');
    groupDiv.appendChild(title);

    grouped[day].forEach(item=>{
      groupDiv.appendChild(renderCard(item));
    });
    main.appendChild(groupDiv);
  });

  updateStats();
}

function renderCard(item){
  const card = document.createElement('div');
  card.className = 'card' + (item.done?' done':'');

  const check = document.createElement('input');
  check.type='checkbox'; check.className='check'; check.checked=!!item.done;
  check.onchange = ()=>{ item.done = check.checked; saveData(); render(); };
  card.appendChild(check);

  const top = document.createElement('div');
  top.className='card-top';
  const timeEl = document.createElement('div');
  timeEl.className='card-time'; timeEl.textContent = item.time||'';
  top.appendChild(timeEl);
  card.appendChild(top);

  const name = document.createElement('div');
  name.className='card-name'; name.textContent = item.place;
  card.appendChild(name);

  if(item.notes){
    const notes = document.createElement('div');
    notes.className='card-notes'; notes.textContent = item.notes;
    card.appendChild(notes);
  }

  const meta = document.createElement('div');
  meta.className='card-meta';
  if(item.cost && item.cost!=='-'){
    const pill = document.createElement('span'); pill.className='pill'; pill.textContent='💴 '+item.cost;
    meta.appendChild(pill);
  }
  if(item.address){
    const pill = document.createElement('span'); pill.className='pill'; pill.textContent='📍 '+item.address;
    meta.appendChild(pill);
  }
  if(item.phone){
    const pill = document.createElement('span'); pill.className='pill'; pill.textContent='☎ '+item.phone;
    meta.appendChild(pill);
  }
  card.appendChild(meta);

  const actions = document.createElement('div');
  actions.className='actions';

  if(item.address){
    const a = document.createElement('a');
    a.href = mapsUrl(item.address); a.target='_blank'; a.className='link-map';
    a.textContent = '🧭 ניווט בגוגל מאפ';
    actions.appendChild(a);
  }
  if(item.phone){
    const a = document.createElement('a');
    a.href = telUrl(item.phone); a.className='link-call';
    a.textContent = '☎ חיוג';
    actions.appendChild(a);
  }
  const editBtn = document.createElement('button');
  editBtn.className='link-edit'; editBtn.textContent='✏ עריכה';
  editBtn.onclick = ()=>openModal(item);
  actions.appendChild(editBtn);

  const delBtn = document.createElement('button');
  delBtn.className='link-del'; delBtn.textContent='🗑 מחיקה';
  delBtn.onclick = ()=>{
    if(confirm('למחוק את "'+item.place+'"?')){
      data = data.filter(d=>d.id!==item.id);
      saveData(); render();
    }
  };
  actions.appendChild(delBtn);

  card.appendChild(actions);
  return card;
}

function updateStats(){
  const total = data.length;
  const done = data.filter(d=>d.done).length;
  document.getElementById('stats').textContent = `${done} מתוך ${total} נקודות עניין הושלמו`;
}

function openModal(item){
  document.getElementById('modalTitle').textContent = item ? 'עריכת נקודת עניין' : 'נקודת עניין חדשה';
  document.getElementById('editId').value = item ? item.id : '';
  document.getElementById('f_day').value = item ? item.day : (uniqueDays().slice(-1)[0]||'');
  document.getElementById('f_date').value = item ? item.date : '';
  document.getElementById('f_time').value = item ? item.time : '';
  document.getElementById('f_place').value = item ? item.place : '';
  document.getElementById('f_address').value = item ? item.address : '';
  document.getElementById('f_phone').value = item ? item.phone : '';
  document.getElementById('f_notes').value = item ? item.notes : '';
  document.getElementById('f_cost').value = item ? item.cost : '';
  document.getElementById('modalBackdrop').classList.add('open');
}
function closeModal(){
  document.getElementById('modalBackdrop').classList.remove('open');
}

document.getElementById('addBtn').onclick = ()=>openModal(null);
document.getElementById('cancelBtn').onclick = closeModal;
document.getElementById('modalBackdrop').onclick = (e)=>{ if(e.target.id==='modalBackdrop') closeModal(); };

document.getElementById('saveBtn').onclick = ()=>{
  const id = document.getElementById('editId').value;
  const place = document.getElementById('f_place').value.trim();
  if(!place){ alert('יש להזין שם מקום'); return; }
  const obj = {
    day: document.getElementById('f_day').value.trim() || 'ללא יום',
    date: document.getElementById('f_date').value.trim(),
    time: document.getElementById('f_time').value.trim(),
    place: place,
    address: document.getElementById('f_address').value.trim(),
    phone: document.getElementById('f_phone').value.trim(),
    notes: document.getElementById('f_notes').value.trim(),
    cost: document.getElementById('f_cost').value.trim() || '-',
    done: false
  };
  if(id){
    const idx = data.findIndex(d=>d.id==id);
    obj.id = data[idx].id;
    obj.done = data[idx].done;
    data[idx] = obj;
  } else {
    obj.id = nextId++;
    data.push(obj);
  }
  saveData();
  closeModal();
  render();
};

document.getElementById('dayFilter').onchange = render;
document.getElementById('searchBox').oninput = render;

document.getElementById('exportBtn').onclick = ()=>{
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'japan_trip_data.json';
  a.click();
};

document.getElementById('resetBtn').onclick = ()=>{
  if(confirm('זה ימחק את כל השינויים שלך ויחזיר לנתוני הבסיס. להמשיך?')){
    data = clone(DEFAULT_DATA);
    nextId = 1;
    data.forEach(d=>{ d.id = nextId++; d.done=false; });
    saveData();
    render();
  }
};

loadData();
render();
</script>
</body>
</html>
